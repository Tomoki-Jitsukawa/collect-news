name: ニュース収集

on:
  # 毎朝9時（JST）に実行 ※ GitHub ActionsはUTCなので0時指定
  schedule:
    - cron: "0 0 * * *"
  # 手動実行も可能
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4.2.2

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: ニュースを収集
        run: python collect_news.py

      - name: news.mdをコミット・push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.md
          git diff --cached --quiet || git commit -m "news.md を更新 $(date +'%Y-%m-%d')"
          git push
